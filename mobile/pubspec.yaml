name: habit_app
description: AI-powered habit tracker with ML recommendations and NLP chatbot.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  fl_chart: ^0.66.0
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  google_sign_in: ^6.2.1
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
